syntax = "proto3";

package extension.v1;

import "problem/v1/problem.proto";

service ExtensionService {
  rpc FocusProblem(FocusProblemRequest) returns (FocusProblemResponse);
  rpc SubscribeSubmit(SubscribeSubmitRequest)
      returns (stream SubscribeSubmitResponse);
}

message FocusProblemRequest {
  string tab_id = 1;
  problem.v1.Problem problem = 2;
}

message FocusProblemResponse {}

message SubscribeSubmitRequest {}

message SubscribeSubmitResponse {
  string tab_id = 1;
}