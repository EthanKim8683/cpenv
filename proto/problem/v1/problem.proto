syntax = "proto3";

package problem.v1;

enum ProblemType {
  PROBLEM_TYPE_UNSPECIFIED = 0;
  PROBLEM_TYPE_BATCH = 1;
  PROBLEM_TYPE_INTERACTIVE = 2;
  PROBLEM_TYPE_RUN_TWICE = 3;
}

enum ProblemIo {
  PROBLEM_IO_UNSPECIFIED = 0;
  PROBLEM_IO_STDIO = 1;
  PROBLEM_IO_FILE = 2;
}

message ProblemSample {
  string input = 1;
  string output = 2;
}

message Problem {
  string id = 1;
  ProblemIo io = 2;
  ProblemType type = 3;
	repeated ProblemSample samples = 4;
}