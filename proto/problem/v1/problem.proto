syntax = "proto3";

package problem.v1;

enum ProblemType {
  PROBLEM_TYPE_UNSPECIFIED = 0;
  PROBLEM_TYPE_STDIO_BATCH = 1;
  PROBLEM_TYPE_STDIO_INTERACTIVE = 2;
  PROBLEM_TYPE_STDIO_RUN_TWICE = 3;
}

message ProblemSample {
  string input = 1;
  string output = 2;
}

message Problem {
  string id = 1;
  ProblemType type = 2;
  repeated ProblemSample samples = 3;
}